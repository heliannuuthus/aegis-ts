name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: heliannuuthus/hephaestus/.github/workflows/ci-node.yml@main

  publish:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [ci]
    uses: heliannuuthus/hephaestus/.github/workflows/ci-publish-node.yml@main
    permissions:
      contents: read
      packages: write
